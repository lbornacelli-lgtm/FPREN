version: "3.9"

services:

  mongodb:
    image: mongo:6
    container_name: weather_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Port not exposed to host — other services reach it via docker network (mongodb:27017)

  rss_fetcher:
    build: .
    container_name: weather_rss_fetcher
    restart: unless-stopped
    volumes:
      - ./feeds:/app/feeds
      - ./logs:/app/logs
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - LOG_FILE=/app/logs/service.log
    command: python weather_service.py

  obs_fetcher:
    build: .
    container_name: weather_obs_fetcher
    restart: unless-stopped
    volumes:
      - ./feeds:/app/feeds
    environment:
      - OUTPUT_DIR=/app/feeds
    command: python weather_rss.py

  ipaws_fetcher:
    build: .
    container_name: weather_ipaws_fetcher
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - LOG_FILE=/app/logs/ipaws.log
      # Switch to production URL when ready:
      # - IPAWS_BASE_URL=https://apps.fema.gov/IPAWSOPEN_EAS_SERVICE/rest/public/recent
      - IPAWS_BASE_URL=https://tdl.apps.fema.gov/IPAWSOPEN_EAS_SERVICE/rest/public/recent
    command: python ipaws_fetcher.py

  alert_worker:
    build: .
    container_name: weather_alerts
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017
    command: python alert_worker.py

  web_dashboard:
    build: ./web
    container_name: weather_web
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
    command: python app.py

  grafana:
    image: grafana/grafana:10.3.4
    container_name: weather_grafana
    user: "472"    # Grafana default user
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - mongodb
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  mongo_data:
  grafana_data:
